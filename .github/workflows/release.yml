name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (defaults to the current ref if it is a tag)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-publish:
    name: Build and publish release
    runs-on: windows-latest
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "No tag was provided and the current ref is not a tag." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        shell: pwsh
        run: ./scripts/build.ps1

      - name: Package
        shell: pwsh
        run: ./scripts/package.ps1

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          generate_release_notes: true
          files: dist/dbd-ping-overlay-windows-amd64.zip
